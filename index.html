<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экосистема в пробирке (Модульная)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Обертка для всей игры -->
    <div id="game-container">
        <div class="toolbar">
            <div class="temp-control">
                <label for="tempSlider">Температура: <span id="tempValue">20</span>°C</label>
                <input type="range" id="tempSlider" min="-50" max="100" value="20">
            </div>
            <!-- Кнопки сгенерируются здесь -->
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <script src="js/main.js" type="module"></script>
    <!-- Аудио плеер. Слово loop заставляет музыку играть по кругу -->
    <audio id="bg-music" loop>
        <source src="audio/music.mp3" type="audio/mpeg">
    </audio>

    <!-- Панель управления звуком -->
    <div id="audio-panel">
        <!-- Управление SFX -->
        <div class="audio-control-row" id="sfx-control">
            <div class="audio-icon">🔊</div>
            <input type="range" id="sfxVolumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <!-- Управление музыкой -->
        <div class="audio-control-row" id="music-control">
            <div class="audio-icon">🎵</div>
            <input type="range" id="musicVolumeSlider" min="0" max="1" step="0.01" value="0.2">
        </div>
    </div>
</body>
</html>
